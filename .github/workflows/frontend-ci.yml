name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend CI - Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'local' }}

    env:
      FRONTEND_ROOT_PATH: ./angular
      SHOULD_PUBLISH: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend changes
        id: diff
        run: |
          BASE_REF="${{ github.base_ref || github.ref_name }}"
          echo "Comparing against origin/$BASE_REF"
          if git diff --name-only origin/$BASE_REF...HEAD | grep '^angular/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Frontend changes detected"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No frontend changes"
          fi

      - name: Skip frontend build (no changes)
        if: steps.diff.outputs.changed != 'true'
        run: echo "Skipping frontend build because no frontend files changed."

      - name: Setup Node.js
        if: steps.diff.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install ABP CLI
        if: steps.diff.outputs.changed == 'true'
        run: dotnet tool install -g Volo.Abp.Cli

      - name: Run abp install-libs
        if: steps.diff.outputs.changed == 'true'
        working-directory: ./angular
        run: abp install-libs

      - name: Cache Yarn dependencies
        if: steps.diff.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            angular/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('angular/yarn.lock') }}

      - name: Install dependencies
        if: steps.diff.outputs.changed == 'true'
        working-directory: ./angular
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        if: steps.diff.outputs.changed == 'true'
        working-directory: ./angular
        run: yarn lint --max-warnings=9999 || true

      - name: Build Angular app
        if: steps.diff.outputs.changed == 'true'
        working-directory: ./angular
        run: yarn build --configuration production

      - name: Compress frontend dist
        if: steps.diff.outputs.changed == 'true' && env.SHOULD_PUBLISH == 'true'
        working-directory: ./angular/dist
        run: zip -r ../../abpsolution1-frontend.zip .

      - name: Upload frontend artifact
        if: steps.diff.outputs.changed == 'true' && env.SHOULD_PUBLISH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: abpsolution1-frontend-production
          path: ./abpsolution1-frontend.zip
