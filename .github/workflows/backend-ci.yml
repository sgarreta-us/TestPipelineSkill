name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend CI - Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'local' }}

    env:
      SOLUTION_PATH: ./AbpSolution1.slnx
      PUBLISH_PROJECT: ./src/AbpSolution1.HttpApi.Host/AbpSolution1.HttpApi.Host.csproj
      PUBLISH_OUTPUT: ./publish
      SHOULD_PUBLISH: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: diff
        run: |
          BASE_REF="${{ github.base_ref || github.ref_name }}"
          echo "Comparing against origin/$BASE_REF"
          if git diff --name-only origin/$BASE_REF...HEAD | grep -E '^(src/|test/|etc/|common\.props$|NuGet\.Config$|AbpSolution1\.(slnx|abpsln|abpmdl)$)'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Backend changes detected"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No backend changes"
          fi

      - name: Skip backend build (no changes)
        if: steps.diff.outputs.changed != 'true'
        run: echo "Skipping backend build because no backend files changed."

      - name: Setup .NET
        if: steps.diff.outputs.changed == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install ABP CLI
        if: steps.diff.outputs.changed == 'true'
        run: dotnet tool install -g Volo.Abp.Cli

      - name: Run abp install-libs
        if: steps.diff.outputs.changed == 'true'
        run: abp install-libs

      - name: Restore dependencies
        if: steps.diff.outputs.changed == 'true'
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        if: steps.diff.outputs.changed == 'true'
        run: dotnet build ${{ env.SOLUTION_PATH }} -c Release --no-restore

      - name: Run tests
        if: steps.diff.outputs.changed == 'true'
        run: dotnet test ${{ env.SOLUTION_PATH }} -c Release --no-build -m:1 --verbosity normal

      - name: Publish and compress artifact
        if: steps.diff.outputs.changed == 'true' && env.SHOULD_PUBLISH == 'true'
        run: |
          dotnet publish ${{ env.PUBLISH_PROJECT }} -c Release -o ${{ env.PUBLISH_OUTPUT }}
          cd ${{ env.PUBLISH_OUTPUT }}
          zip -r ../abpsolution1-backend.zip .

      - name: Upload backend artifact
        if: steps.diff.outputs.changed == 'true' && env.SHOULD_PUBLISH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: abpsolution1-backend
          path: ./abpsolution1-backend.zip
